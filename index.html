<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050a08">
    <title>Gametrack — 5-Set Sports Scorer</title>
    <meta name="description" content="Gametrack is a clean, fast scoreboard for tracking 5-set sports matches. Type scores directly, use +/− buttons, undo, swap players and export results.">
    <meta name="keywords" content="scoreboard, sports scorer, tennis score, set tracker, match score, score keeper">
    <meta name="author" content="happybein.com">
    <meta name="robots" content="index, follow">

    <!-- Canonical -->
    <link rel="canonical" href="https://happybein.com">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icons/icon-192x192.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Gametrack — 5-Set Sports Scorer">
    <meta property="og:description" content="Clean, fast scoreboard for tracking 5-set sports matches. Type scores directly, use +/− buttons, undo and export.">
    <meta property="og:image" content="og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://happybein.com">
    <meta property="og:site_name" content="Gametrack">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Gametrack — 5-Set Sports Scorer">
    <meta name="twitter:description" content="Clean, fast scoreboard for tracking 5-set sports matches.">
    <meta name="twitter:image" content="og-image.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #050a08;
            --bg2:        #0b1410;
            --surface:    #111c17;
            --line:       #1e3028;
            --green:      #3dba7a;
            --blue:       #3d8eba;
            --green-dim:  rgba(61,186,122,0.12);
            --blue-dim:   rgba(61,142,186,0.12);
            --green-glow: rgba(61,186,122,0.28);
            --blue-glow:  rgba(61,142,186,0.28);
            --text:       #e8f5ee;
            --muted:      #4a7060;
            --danger:     #e05555;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(61,186,122,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(61,186,122,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none; z-index: 0;
        }

        header, .court, .action-bar, footer { position: relative; z-index: 1; }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
            background: var(--bg2);
            gap: 10px;
        }
        .logo-wordmark {
            display: flex; align-items: center; gap: 9px; flex-shrink: 0;
        }
        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px; letter-spacing: 3px;
            background: linear-gradient(120deg, var(--green), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .version-tag {
            font-size: 9px; letter-spacing: 1px;
            color: var(--muted); text-transform: uppercase;
            background: var(--surface);
            border: 1px solid var(--line);
            padding: 3px 8px; border-radius: 20px;
        }
        .reset-btn {
            background: none; border: 1px solid var(--line);
            color: var(--muted); font-family: 'DM Mono', monospace;
            font-size: 10px; letter-spacing: 1px;
            padding: 5px 11px; border-radius: 6px; cursor: pointer;
            transition: all 0.15s;
        }
        .reset-btn:active { border-color: var(--danger); color: var(--danger); }

        /* ── TWO-COLUMN COURT ── */
        .court {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
            min-height: 0;
        }

        .player-col {
            display: flex;
            flex-direction: column;
            padding: 14px 12px 10px;
            gap: 12px;
        }

        /* center divider line */
        .divider {
            background: var(--line);
            position: relative;
        }
        .divider::before {
            content: 'VS';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 11px;
            color: var(--muted);
            background: var(--bg);
            padding: 4px 0;
            writing-mode: vertical-rl;
            letter-spacing: 3px;
        }

        /* player name */
        .player-name-input {
            background: transparent; border: none;
            border-bottom: 1px solid transparent;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 12px; font-weight: 500;
            width: 100%; outline: none;
            letter-spacing: 0.5px; padding-bottom: 3px;
            transition: border-color 0.2s;
        }
        .player-name-input::placeholder { color: var(--muted); }
        .p1-col .player-name-input:focus { border-bottom-color: var(--green); }
        .p2-col .player-name-input:focus { border-bottom-color: var(--blue); }

        /* set row label */
        .set-row-label {
            font-size: 8px; color: var(--muted);
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 2px;
        }

        /* ── SET ITEM ── */
        .set-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* the score box (clickable input area) */
        .set-box {
            flex: 1;
            position: relative;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 10px;
            height: 52px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
            cursor: text;
        }
        .set-box.has-score { border-color: rgba(61,186,122,0.3); }
        .p2-col .set-box.has-score { border-color: rgba(61,142,186,0.3); }
        .set-box.won-box {
            box-shadow: 0 0 14px var(--green-glow);
            border-color: var(--green) !important;
            background: var(--green-dim);
        }
        .p2-col .set-box.won-box {
            box-shadow: 0 0 14px var(--blue-glow);
            border-color: var(--blue) !important;
            background: var(--blue-dim);
        }

        /* the actual input inside */
        .set-input {
            width: 100%; height: 100%;
            background: transparent; border: none; outline: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 30px; line-height: 1;
            text-align: center;
            color: var(--muted);
            caret-color: var(--green);
            -moz-appearance: textfield;
            cursor: text;
            padding: 0;
        }
        .set-input::-webkit-inner-spin-button,
        .set-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .set-input:focus { color: var(--text); }
        .p1-col .set-input.scored { color: var(--green); }
        .p2-col .set-input.scored { color: var(--blue); }
        .p2-col .set-input { caret-color: var(--blue); }

        /* won dot */
        .set-box.won-box::after {
            content: '●';
            position: absolute; top: 4px; right: 6px;
            font-size: 5px; color: var(--green);
        }
        .p2-col .set-box.won-box::after { color: var(--blue); }

        /* +/- stepper buttons */
        .steppers {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex-shrink: 0;
        }
        .step-btn {
            width: 28px; height: 24px;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--muted);
            font-size: 14px; font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
            line-height: 1;
        }
        .step-btn:active { transform: scale(0.88); }
        .p1-col .step-btn.up:active { background: var(--green); border-color: var(--green); color: #000; }
        .p2-col .step-btn.up:active { background: var(--blue);  border-color: var(--blue);  color: #000; }
        .step-btn.down:active { background: var(--danger); border-color: var(--danger); color: #fff; }

        /* ── TIMER BAR ── */
        .timer-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 10px 20px;
            border-top: 1px solid var(--line);
            background: var(--bg2);
        }
        .timer-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 4px;
            color: var(--text);
            min-width: 100px;
            text-align: center;
            line-height: 1;
            transition: color 0.3s;
        }
        .timer-display.running { color: var(--green); }
        .timer-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--muted);
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .timer-btn:active { transform: scale(0.88); }
        .timer-btn.start-stop { font-size: 13px; }
        .timer-btn.start-stop.running {
            background: var(--green-dim);
            border-color: var(--green);
            color: var(--green);
        }
        .timer-btn.reset-timer:active { background: var(--danger); border-color: var(--danger); color: #fff; }

        /* ── ACTION BAR ── */
        .action-bar {
            display: flex; gap: 8px;
            padding: 10px 14px;
            border-top: 1px solid var(--line);
            background: var(--bg2);
        }
        .act-btn {
            flex: 1; padding: 10px 6px;
            border: 1px solid var(--line);
            background: var(--surface); color: var(--muted);
            border-radius: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 10px; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.15s;
        }
        .act-btn:active { background: var(--line); color: var(--text); }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 72px; left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: var(--surface); color: var(--text);
            border: 1px solid var(--line);
            padding: 9px 18px; border-radius: 8px;
            font-size: 11px; letter-spacing: 0.5px;
            opacity: 0; pointer-events: none;
            transition: all 0.25s; z-index: 999;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── FOOTER ── */
        footer {
            padding: 9px 20px;
            border-top: 1px solid var(--line);
            background: var(--bg2);
            display: flex; justify-content: center;
        }
        .footer-link {
            display: inline-flex; align-items: center; gap: 8px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .footer-link:hover { opacity: 0.75; }
        .hb-logo {
            width: 22px; height: 22px;
            object-fit: contain;
        }
        .hb-text {
            font-family: 'DM Mono', monospace;
            font-size: 11px; font-weight: 500;
            letter-spacing: 1.5px;
            color: #3dba7a;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-wordmark">
        <span class="logo-text">Gametrack</span>
    </div>
    <div class="header-right">
        <span class="version-tag">v1.9</span>
        <button class="reset-btn" onclick="confirmReset()">↺ Reset</button>
    </div>
</header>

<!-- Two-column court -->
<div class="court">

    <!-- Player 1 column -->
    <div class="player-col p1-col" id="p1-col">
        <input type="text" class="player-name-input" id="p1-name" placeholder="Player 1" maxlength="12" value="Player 1">
        <div class="set-row-label">Sets</div>
        <!-- set items built by JS -->
    </div>

    <!-- Center divider -->
    <div class="divider"></div>

    <!-- Player 2 column -->
    <div class="player-col p2-col" id="p2-col">
        <input type="text" class="player-name-input" id="p2-name" placeholder="Player 2" maxlength="12" value="Player 2">
        <div class="set-row-label">Sets</div>
        <!-- set items built by JS -->
    </div>

</div>

<div class="timer-bar">
    <button class="timer-btn reset-timer" id="timer-reset" onclick="timerReset()">↺</button>
    <div class="timer-display" id="timer-display">00:00</div>
    <button class="timer-btn start-stop" id="timer-toggle" onclick="timerToggle()">▶</button>
</div>

<div class="action-bar">
    <button class="act-btn" onclick="undoLast()">↩ Undo</button>
    <button class="act-btn" onclick="swapPlayers()">⇄ Swap</button>
    <button class="act-btn" onclick="exportData()">⬇ Export</button>
</div>

<div class="toast" id="toast"></div>

<footer>
    <a class="footer-link" href="https://happybein.com" target="_blank" rel="noopener">
        <img src="hb-logo.png" alt="happybein.com" class="hb-logo">
        <span class="hb-text">HAPPYBEIN.COM</span>
    </a>
</footer>

<script>
const VERSION  = '1.4';
const NUM_SETS = 5;

let state = {
    p1Name: 'Player 1',
    p2Name: 'Player 2',
    sets: Array.from({ length: NUM_SETS }, () => ({ p1: null, p2: null })),
    history: []
};

// ── Build DOM ──────────────────────────────────────────────────────
function buildCols() {
    ['p1', 'p2'].forEach(p => {
        const col = document.getElementById(p + '-col');
        for (let i = 0; i < NUM_SETS; i++) {
            const item = document.createElement('div');
            item.className = 'set-item';

            const box = document.createElement('div');
            box.className = 'set-box';
            box.id = p + '-box-' + i;

            const inp = document.createElement('input');
            inp.type = 'number';
            inp.inputMode = 'numeric';
            inp.pattern = '[0-9]*';
            inp.className = 'set-input';
            inp.id = p + '-inp-' + i;
            inp.min = 0; inp.max = 99;
            inp.autocomplete = 'off';

            // clicking the box focuses the input
            box.addEventListener('click', () => { inp.focus(); inp.select(); });

            inp.addEventListener('focus', () => { inp.select(); });

            inp.addEventListener('change', () => handleInputChange(p, i, inp));
            inp.addEventListener('blur',   () => handleInputChange(p, i, inp));
            inp.addEventListener('keydown', e => {
                if (e.key === 'Enter') { inp.blur(); }
            });

            box.appendChild(inp);

            // stepper buttons
            const steppers = document.createElement('div');
            steppers.className = 'steppers';

            const up = document.createElement('button');
            up.className = 'step-btn up';
            up.textContent = '+';
            up.addEventListener('click', () => stepScore(p, i, 1));

            const dn = document.createElement('button');
            dn.className = 'step-btn down';
            dn.textContent = '−';
            dn.addEventListener('click', () => stepScore(p, i, -1));

            steppers.appendChild(up);
            steppers.appendChild(dn);
            item.appendChild(box);
            item.appendChild(steppers);
            col.appendChild(item);
        }
    });
}

// ── Score handling ─────────────────────────────────────────────────
function handleInputChange(player, setIdx, inp) {
    const raw = inp.value.trim();
    const val = raw === '' ? null : Math.max(0, parseInt(raw, 10) || 0);
    saveHist();
    state.sets[setIdx][player] = val;
    renderAll();
    saveState();
}

function stepScore(player, setIdx, delta) {
    saveHist();
    const cur = state.sets[setIdx][player];
    state.sets[setIdx][player] = Math.max(0, (cur === null ? 0 : cur) + delta);
    renderAll();
    saveState();
}

// ── Render ─────────────────────────────────────────────────────────
function renderAll() {
    document.getElementById('p1-name').value = state.p1Name;
    document.getElementById('p2-name').value = state.p2Name;

    for (let i = 0; i < NUM_SETS; i++) {
        const s = state.sets[i];
        ['p1', 'p2'].forEach(p => {
            const inp = document.getElementById(p + '-inp-' + i);
            const box = document.getElementById(p + '-box-' + i);
            const val = s[p];
            const opp = p === 'p1' ? s.p2 : s.p1;
            const hasScore = val !== null;
            const won = hasScore && opp !== null && val > opp;

            // Only update value if input is not focused (avoid clobbering live typing)
            if (document.activeElement !== inp) {
                inp.value = hasScore ? val : '';
            }
            inp.classList.toggle('scored', hasScore);
            box.classList.toggle('has-score', hasScore);
            box.classList.toggle('won-box', won);
        });
    }
}

// ── Undo / history ────────────────────────────────────────────────
function saveHist() {
    state.history.push({
        p1Name: state.p1Name, p2Name: state.p2Name,
        sets: state.sets.map(s => ({ ...s }))
    });
    if (state.history.length > 30) state.history.shift();
}

function undoLast() {
    if (!state.history.length) { showToast('Nothing to undo'); return; }
    const prev = state.history.pop();
    state.p1Name = prev.p1Name; state.p2Name = prev.p2Name;
    state.sets = prev.sets.map(s => ({ ...s }));
    renderAll(); saveState();
    showToast('Undone');
}

// ── Actions ───────────────────────────────────────────────────────
function confirmReset() {
    if (confirm('Reset the entire match?')) resetMatch();
}
function resetMatch() {
    saveHist();
    state.sets = Array.from({ length: NUM_SETS }, () => ({ p1: null, p2: null }));
    renderAll(); saveState(); showToast('Match reset');
}

function swapPlayers() {
    saveHist();
    [state.p1Name, state.p2Name] = [state.p2Name, state.p1Name];
    state.sets = state.sets.map(s => ({ p1: s.p2, p2: s.p1 }));
    renderAll(); saveState(); showToast('Players swapped');
}

function exportData() {
    const rows = ['Set,' + state.p1Name + ',' + state.p2Name];
    state.sets.forEach((s, i) => rows.push((i+1) + ',' + (s.p1 ?? '') + ',' + (s.p2 ?? '')));
    const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'gametrack-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('Exported!');
}

// ── Persist ───────────────────────────────────────────────────────
function saveState() {
    try { localStorage.setItem('gt_v13', JSON.stringify(state)); } catch(e) {}
}
function loadState() {
    try {
        const raw = localStorage.getItem('gt_v13');
        if (!raw) return;
        const s = JSON.parse(raw);
        if (s.sets && s.sets.length === NUM_SETS) {
            state.p1Name = s.p1Name || 'Player 1';
            state.p2Name = s.p2Name || 'Player 2';
            state.sets   = s.sets.map(x => ({ p1: x.p1 ?? null, p2: x.p2 ?? null }));
        }
    } catch(e) {}
}

// ── Toast ─────────────────────────────────────────────────────────
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Name listeners ────────────────────────────────────────────────
function initNameListeners() {
    document.getElementById('p1-name').addEventListener('input', e => {
        state.p1Name = e.target.value || 'Player 1'; saveState();
    });
    document.getElementById('p2-name').addEventListener('input', e => {
        state.p2Name = e.target.value || 'Player 2'; saveState();
    });
}

// ── Timer ─────────────────────────────────────────────────────────
let timerSeconds = 0;
let timerInterval = null;
let timerRunning = false;

function timerToggle() {
    if (timerRunning) {
        clearInterval(timerInterval);
        timerRunning = false;
    } else {
        timerInterval = setInterval(() => {
            timerSeconds++;
            renderTimer();
        }, 1000);
        timerRunning = true;
    }
    renderTimer();
}

function timerReset() {
    clearInterval(timerInterval);
    timerRunning = false;
    timerSeconds = 0;
    renderTimer();
}

function renderTimer() {
    const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
    const s = String(timerSeconds % 60).padStart(2, '0');
    const display = document.getElementById('timer-display');
    const toggle  = document.getElementById('timer-toggle');
    display.textContent = m + ':' + s;
    display.classList.toggle('running', timerRunning);
    toggle.textContent = timerRunning ? '⏸' : '▶';
    toggle.classList.toggle('running', timerRunning);
}

// ── Init ──────────────────────────────────────────────────────────
buildCols();
loadState();
renderAll();
initNameListeners();
</script>
</body>
</html>
