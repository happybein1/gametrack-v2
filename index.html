<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050a08">
    <title>Gametrack</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #050a08;
            --bg2:      #0b1410;
            --surface:  #111c17;
            --line:     #1e3028;
            --green:    #3dba7a;
            --blue:     #3d8eba;
            --green-dim: rgba(61,186,122,0.12);
            --blue-dim:  rgba(61,142,186,0.12);
            --green-glow: rgba(61,186,122,0.25);
            --blue-glow:  rgba(61,142,186,0.25);
            --text:     #e8f5ee;
            --muted:    #4a7060;
            --danger:   #e05555;
            --p1:       #3dba7a;
            --p2:       #3d8eba;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* subtle grid texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(61,186,122,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(61,186,122,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        header, .set-headers, .players, .action-bar, footer { position: relative; z-index: 1; }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px 14px;
            border-bottom: 1px solid var(--line);
            background: var(--bg2);
        }

        .logo-wordmark {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }
        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 3px;
            background: linear-gradient(120deg, var(--green), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .set-label {
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
        }
        .reset-btn {
            background: none;
            border: 1px solid var(--line);
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .reset-btn:hover, .reset-btn:active { border-color: var(--danger); color: var(--danger); }

        /* ── Column headers ── */
        .set-headers {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid var(--line);
            background: var(--bg2);
        }
        .set-header-spacer {
            width: 128px;
            flex-shrink: 0;
            border-right: 1px solid var(--line);
        }
        .set-header-labels {
            flex: 1;
            display: flex;
            padding: 6px 12px;
            gap: 6px;
        }
        .set-col-label {
            flex: 1;
            text-align: center;
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ── Players ── */
        .players {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .player-row {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid var(--line);
        }

        .player-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 14px 14px;
            gap: 10px;
            width: 128px;
            flex-shrink: 0;
            border-right: 1px solid var(--line);
        }

        .player-name-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            width: 100%;
            outline: none;
            letter-spacing: 0.5px;
            padding-bottom: 2px;
            transition: border-color 0.2s;
        }
        .player-name-input::placeholder { color: var(--muted); }
        .p1-row .player-name-input:focus { border-bottom-color: var(--green); }
        .p2-row .player-name-input:focus { border-bottom-color: var(--blue); }

        .score-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sc-btn {
            width: 26px; height: 26px;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
            flex-shrink: 0;
        }
        .sc-btn:active { transform: scale(0.88); }
        .p1-row .sc-btn.plus:active  { background: var(--green); border-color: var(--green); color: #000; }
        .p2-row .sc-btn.plus:active  { background: var(--blue);  border-color: var(--blue);  color: #000; }
        .sc-btn.minus:active { background: var(--danger); border-color: var(--danger); }

        .total-score-wrap { text-align: center; }
        .total-games {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 30px;
            line-height: 1;
        }
        .p1-row .total-games { color: var(--green); }
        .p2-row .total-games { color: var(--blue); }
        .games-label {
            font-size: 8px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── Set boxes ── */
        .sets-area {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 12px;
        }
        .set-boxes {
            display: flex;
            gap: 6px;
            width: 100%;
        }
        .set-box {
            flex: 1;
            aspect-ratio: 1;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
            min-width: 0;
            overflow: hidden;
        }
        .set-box:active { transform: scale(0.91); }
        .set-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(16px, 4vw, 26px);
            color: var(--muted);
            transition: color 0.2s;
        }

        /* P1 states */
        .p1-row .set-box.has-score { border-color: rgba(61,186,122,0.3); }
        .p1-row .set-box.has-score .set-score { color: var(--green); }
        .p1-row .set-box.won {
            background: var(--green-dim);
            border-color: var(--green);
            box-shadow: 0 0 12px var(--green-glow);
        }
        .p1-row .set-box.won::after {
            content: '●';
            position: absolute;
            top: 4px; right: 5px;
            font-size: 5px;
            color: var(--green);
        }
        .p1-row .set-box.current { border-color: rgba(61,186,122,0.5); border-style: dashed; }

        /* P2 states */
        .p2-row .set-box.has-score { border-color: rgba(61,142,186,0.3); }
        .p2-row .set-box.has-score .set-score { color: var(--blue); }
        .p2-row .set-box.won {
            background: var(--blue-dim);
            border-color: var(--blue);
            box-shadow: 0 0 12px var(--blue-glow);
        }
        .p2-row .set-box.won::after {
            content: '●';
            position: absolute;
            top: 4px; right: 5px;
            font-size: 5px;
            color: var(--blue);
        }
        .p2-row .set-box.current { border-color: rgba(61,142,186,0.5); border-style: dashed; }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal {
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 26px 22px;
            width: min(310px, 90vw);
            transform: translateY(12px);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .modal::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--green), var(--blue));
        }
        .modal-overlay.open .modal { transform: translateY(0); }
        .modal h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            background: linear-gradient(120deg, var(--green), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .modal-scores {
            display: flex; gap: 16px; margin-bottom: 18px;
            align-items: center;
        }
        .modal-player { flex: 1; text-align: center; }
        .modal-player-name {
            font-size: 10px; color: var(--muted);
            letter-spacing: 1px; margin-bottom: 10px;
            text-transform: uppercase;
        }
        .modal-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 54px; line-height: 1;
        }
        .modal-p1 .modal-num { color: var(--green); }
        .modal-p2 .modal-num { color: var(--blue); }
        .modal-btns { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
        .modal-sc {
            width: 38px; height: 38px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            font-size: 20px; font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-sc.plus:active  { background: var(--green); color: #000; }
        .modal-sc.minus:active { background: var(--danger); }
        .modal-divider { color: var(--muted); font-size: 20px; padding-top: 10px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
        .modal-save {
            flex: 1; padding: 12px;
            background: linear-gradient(120deg, var(--green), var(--blue));
            color: #000;
            border: none; border-radius: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 12px; font-weight: 500;
            cursor: pointer; letter-spacing: 1px;
        }
        .modal-cancel {
            flex: 1; padding: 12px;
            background: none; color: var(--muted);
            border: 1px solid var(--line); border-radius: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 12px; cursor: pointer;
        }

        /* ── Action bar ── */
        .action-bar {
            display: flex; gap: 8px;
            padding: 10px 14px;
            border-top: 1px solid var(--line);
            background: var(--bg2);
        }
        .act-btn {
            flex: 1; padding: 10px 6px;
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--muted);
            border-radius: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .act-btn:active { background: var(--line); color: var(--text); }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 72px; left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--line);
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 11px;
            letter-spacing: 0.5px;
            opacity: 0; pointer-events: none;
            transition: all 0.25s;
            z-index: 999;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Footer ── */
        footer {
            padding: 10px 20px;
            border-top: 1px solid var(--line);
            background: var(--bg2);
            display: flex;
            justify-content: center;
        }
        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.2s;
            padding: 4px 0;
        }
        .footer-link:hover { color: var(--green); }
        .footer-link svg { transition: filter 0.2s; }
        .footer-link:hover svg { filter: drop-shadow(0 0 4px var(--green)); }

        .undo-hint {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 1px;
            text-align: center;
            padding: 4px 0 2px;
            opacity: 0;
            transition: opacity 0.4s;
            position: relative; z-index: 1;
        }
        .undo-hint.show { opacity: 1; }
    </style>
</head>
<body>

<header>
    <div class="logo-wordmark">
        <!-- Inline logo SVG -->
        <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- Big blue H outline -->
            <rect x="12" y="10" width="12" height="80" rx="3" fill="none" stroke="#3d8eba" stroke-width="7"/>
            <rect x="76" y="10" width="12" height="80" rx="3" fill="none" stroke="#3d8eba" stroke-width="7"/>
            <rect x="18" y="42" width="64" height="12" rx="3" fill="none" stroke="#3d8eba" stroke-width="7"/>
            <!-- Small green H inside -->
            <rect x="33" y="52" width="8" height="38" rx="2" fill="none" stroke="#3dba7a" stroke-width="5"/>
            <rect x="59" y="52" width="8" height="38" rx="2" fill="none" stroke="#3dba7a" stroke-width="5"/>
            <rect x="37" y="66" width="26" height="8" rx="2" fill="none" stroke="#3dba7a" stroke-width="5"/>

            <line x1="5" y1="5" x2="5" y2="30" stroke="#3dba7a" stroke-width="3"/>
            <circle cx="5" cy="5" r="5" fill="none" stroke="#3dba7a" stroke-width="3"/>
            <circle cx="5" cy="5" r="2" fill="white"/>
            <!-- Blue circuit dot bottom-left -->
            <line x1="18" y1="90" x2="18" y2="72" stroke="#3dba7a" stroke-width="3"/>
            <circle cx="18" cy="90" r="6" fill="none" stroke="#3d8eba" stroke-width="3.5"/>
            <circle cx="18" cy="90" r="2.5" fill="white"/>
            <!-- Green circuit dot middle-right -->
            <line x1="82" y1="28" x2="82" y2="50" stroke="#3dba7a" stroke-width="3"/>
            <circle cx="82" cy="28" r="5" fill="none" stroke="#3dba7a" stroke-width="3"/>
            <circle cx="82" cy="28" r="2" fill="white"/>
            <!-- Blue circuit dot bottom-right -->
            <line x1="95" y1="95" x2="95" y2="65" stroke="#3dba7a" stroke-width="3"/>
            <circle cx="95" cy="95" r="5" fill="none" stroke="#3d8eba" stroke-width="3.5"/>
            <circle cx="95" cy="95" r="2" fill="white"/>
        </svg>
        <span class="logo-text">Gametrack</span>
    </div>
    <span class="set-label">5-Set Scorer</span>
    <button class="reset-btn" onclick="confirmReset()">↺ Reset</button>
</header>

<div class="set-headers">
    <div class="set-header-spacer"></div>
    <div class="set-header-labels" id="set-header-labels"></div>
</div>

<div class="players">
    <div class="player-row p1-row" id="p1-row">
        <div class="player-info">
            <input type="text" class="player-name-input" id="p1-name" placeholder="Player 1" maxlength="10" value="Player 1">
            <div class="score-controls">
                <button class="sc-btn minus" onclick="adjGames(1,-1)">−</button>
                <div class="total-score-wrap">
                    <div class="total-games" id="p1-games">0</div>
                    <div class="games-label">games</div>
                </div>
                <button class="sc-btn plus" onclick="adjGames(1,1)">+</button>
            </div>
        </div>
        <div class="sets-area" id="p1-sets-area"></div>
    </div>

    <div class="player-row p2-row" id="p2-row">
        <div class="player-info">
            <input type="text" class="player-name-input" id="p2-name" placeholder="Player 2" maxlength="10" value="Player 2">
            <div class="score-controls">
                <button class="sc-btn minus" onclick="adjGames(2,-1)">−</button>
                <div class="total-score-wrap">
                    <div class="total-games" id="p2-games">0</div>
                    <div class="games-label">games</div>
                </div>
                <button class="sc-btn plus" onclick="adjGames(2,1)">+</button>
            </div>
        </div>
        <div class="sets-area" id="p2-sets-area"></div>
    </div>
</div>

<div class="undo-hint" id="undo-hint">Tap a set box to edit scores</div>

<div class="action-bar">
    <button class="act-btn" onclick="undoLast()">↩ Undo</button>
    <button class="act-btn" onclick="swapPlayers()">⇄ Swap</button>
    <button class="act-btn" onclick="exportData()">⬇ Export</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
        <h3 id="modal-title">Set 1</h3>
        <div class="modal-scores">
            <div class="modal-player modal-p1">
                <div class="modal-player-name" id="modal-p1-name">P1</div>
                <div class="modal-num" id="modal-p1-score">0</div>
                <div class="modal-btns">
                    <button class="modal-sc minus" onclick="modalAdj(1,-1)">−</button>
                    <button class="modal-sc plus" onclick="modalAdj(1,1)">+</button>
                </div>
            </div>
            <div class="modal-divider">—</div>
            <div class="modal-player modal-p2">
                <div class="modal-player-name" id="modal-p2-name">P2</div>
                <div class="modal-num" id="modal-p2-score">0</div>
                <div class="modal-btns">
                    <button class="modal-sc minus" onclick="modalAdj(2,-1)">−</button>
                    <button class="modal-sc plus" onclick="modalAdj(2,1)">+</button>
                </div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-save" onclick="saveModal()">Save Set</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<footer>
    <a class="footer-link" href="https://happybein.com" target="_blank" rel="noopener">
        <!-- Miniature logo in footer -->
        <svg width="20" height="20" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="12" y="10" width="12" height="80" rx="3" fill="none" stroke="#3d8eba" stroke-width="7"/>
            <rect x="76" y="10" width="12" height="80" rx="3" fill="none" stroke="#3d8eba" stroke-width="7"/>
            <rect x="18" y="42" width="64" height="12" rx="3" fill="none" stroke="#3d8eba" stroke-width="7"/>
            <rect x="33" y="52" width="8" height="38" rx="2" fill="none" stroke="#3dba7a" stroke-width="5"/>
            <rect x="59" y="52" width="8" height="38" rx="2" fill="none" stroke="#3dba7a" stroke-width="5"/>
            <rect x="37" y="66" width="26" height="8" rx="2" fill="none" stroke="#3dba7a" stroke-width="5"/>
            <circle cx="5" cy="5" r="4" fill="none" stroke="#3dba7a" stroke-width="2.5"/>
            <circle cx="5" cy="5" r="1.5" fill="white"/>
            <circle cx="18" cy="90" r="5" fill="none" stroke="#3d8eba" stroke-width="3"/>
            <circle cx="18" cy="90" r="2" fill="white"/>
            <circle cx="82" cy="28" r="4" fill="none" stroke="#3dba7a" stroke-width="2.5"/>
            <circle cx="82" cy="28" r="1.5" fill="white"/>
            <circle cx="95" cy="95" r="4" fill="none" stroke="#3d8eba" stroke-width="3"/>
            <circle cx="95" cy="95" r="1.5" fill="white"/>
        </svg>
        happybein.com
    </a>
</footer>

<script>
const NUM_SETS = 5;

let state = {
    p1Name: 'Player 1', p2Name: 'Player 2',
    p1Games: 0, p2Games: 0,
    sets: Array.from({ length: NUM_SETS }, () => ({ p1: 0, p2: 0 })),
    history: []
};

let modalSet = null;
let modalScores = { p1: 0, p2: 0 };

function init() {
    buildSetHeaders();
    buildSetBoxes();
    loadState();
    renderAll();

    document.getElementById('p1-name').addEventListener('input', e => {
        state.p1Name = e.target.value || 'Player 1';
        updateNames(); saveState();
    });
    document.getElementById('p2-name').addEventListener('input', e => {
        state.p2Name = e.target.value || 'Player 2';
        updateNames(); saveState();
    });

    setTimeout(() => document.getElementById('undo-hint').classList.add('show'), 600);
    setTimeout(() => document.getElementById('undo-hint').classList.remove('show'), 4000);
}

function buildSetHeaders() {
    const el = document.getElementById('set-header-labels');
    el.innerHTML = '';
    for (let i = 0; i < NUM_SETS; i++) {
        const d = document.createElement('div');
        d.className = 'set-col-label';
        d.textContent = 'S' + (i + 1);
        el.appendChild(d);
    }
}

function buildSetBoxes() {
    ['p1', 'p2'].forEach(p => {
        const area = document.getElementById(p + '-sets-area');
        area.innerHTML = '';
        const row = document.createElement('div');
        row.className = 'set-boxes';
        for (let i = 0; i < NUM_SETS; i++) {
            const box = document.createElement('div');
            box.className = 'set-box';
            box.id = p + '-set-' + i;
            box.innerHTML = '<div class="set-score" id="' + p + '-setscore-' + i + '">—</div>';
            box.addEventListener('click', () => openModal(i));
            row.appendChild(box);
        }
        area.appendChild(row);
    });
}

function renderAll() {
    document.getElementById('p1-games').textContent = state.p1Games;
    document.getElementById('p2-games').textContent = state.p2Games;
    document.getElementById('p1-name').value = state.p1Name;
    document.getElementById('p2-name').value = state.p2Name;
    updateNames();

    const nextEmpty = nextEmptySet();
    for (let i = 0; i < NUM_SETS; i++) {
        const s = state.sets[i];
        const isEmpty = s.p1 === 0 && s.p2 === 0;
        ['p1', 'p2'].forEach(p => {
            const box = document.getElementById(p + '-set-' + i);
            const score = document.getElementById(p + '-setscore-' + i);
            const val = s[p];
            const opp = p === 'p1' ? s.p2 : s.p1;
            score.textContent = isEmpty ? '—' : val;
            box.className = 'set-box';
            if (!isEmpty) {
                box.classList.add('has-score');
                if (val > opp) box.classList.add('won');
            }
            if (i === nextEmpty) box.classList.add('current');
        });
    }
}

function nextEmptySet() {
    for (let i = 0; i < NUM_SETS; i++) {
        if (state.sets[i].p1 === 0 && state.sets[i].p2 === 0) return i;
    }
    return -1;
}

function updateNames() {
    document.getElementById('modal-p1-name').textContent = state.p1Name;
    document.getElementById('modal-p2-name').textContent = state.p2Name;
}

function adjGames(player, delta) {
    saveHist();
    if (player === 1) state.p1Games = Math.max(0, state.p1Games + delta);
    else              state.p2Games = Math.max(0, state.p2Games + delta);
    renderAll(); saveState();
}

function openModal(setIndex) {
    modalSet = setIndex;
    modalScores = { ...state.sets[setIndex] };
    document.getElementById('modal-title').textContent = 'Set ' + (setIndex + 1);
    updateModalDisplay();
    document.getElementById('modal-overlay').classList.add('open');
}

function updateModalDisplay() {
    document.getElementById('modal-p1-score').textContent = modalScores.p1;
    document.getElementById('modal-p2-score').textContent = modalScores.p2;
}

function modalAdj(player, delta) {
    if (player === 1) modalScores.p1 = Math.max(0, modalScores.p1 + delta);
    else              modalScores.p2 = Math.max(0, modalScores.p2 + delta);
    updateModalDisplay();
}

function saveModal() {
    saveHist();
    state.sets[modalSet] = { ...modalScores };
    renderAll(); saveState();
    closeModal();
    showToast('Set ' + (modalSet + 1) + ' saved');
}

function closeModal(e) {
    if (e && e.target !== document.getElementById('modal-overlay')) return;
    document.getElementById('modal-overlay').classList.remove('open');
    modalSet = null;
}

function confirmReset() {
    if (confirm('Reset the entire match?')) resetMatch();
}

function resetMatch() {
    saveHist();
    state.p1Games = 0; state.p2Games = 0;
    state.sets = Array.from({ length: NUM_SETS }, () => ({ p1: 0, p2: 0 }));
    renderAll(); saveState();
    showToast('Match reset');
}

function swapPlayers() {
    saveHist();
    [state.p1Name, state.p2Name] = [state.p2Name, state.p1Name];
    [state.p1Games, state.p2Games] = [state.p2Games, state.p1Games];
    state.sets = state.sets.map(s => ({ p1: s.p2, p2: s.p1 }));
    renderAll(); saveState();
    showToast('Players swapped');
}

function undoLast() {
    if (state.history.length === 0) { showToast('Nothing to undo'); return; }
    const prev = state.history.pop();
    Object.assign(state, { ...prev, history: state.history });
    state.sets = prev.sets.map(s => ({ ...s }));
    renderAll(); saveState();
    showToast('Undone');
}

function saveHist() {
    state.history.push({
        p1Games: state.p1Games, p2Games: state.p2Games,
        p1Name: state.p1Name, p2Name: state.p2Name,
        sets: state.sets.map(s => ({ ...s }))
    });
    if (state.history.length > 20) state.history.shift();
}

function exportData() {
    const rows = ['Set,Player 1 (' + state.p1Name + '),Player 2 (' + state.p2Name + ')'];
    state.sets.forEach((s, i) => rows.push((i+1) + ',' + s.p1 + ',' + s.p2));
    rows.push('', 'Games,' + state.p1Games + ',' + state.p2Games);
    const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'gametrack-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('Exported!');
}

function saveState() {
    try { localStorage.setItem('gt_state', JSON.stringify(state)); } catch(e) {}
}
function loadState() {
    try {
        const raw = localStorage.getItem('gt_state');
        if (!raw) return;
        const s = JSON.parse(raw);
        if (s.sets && s.sets.length === NUM_SETS) Object.assign(state, s);
    } catch(e) {}
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
