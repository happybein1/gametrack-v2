<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Umpire PWA</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .scoreboard { display: flex; gap: 40px; font-size: 120px; font-weight: bold; margin-bottom: 20px; }
        .player { text-align: center; }
        .label { font-size: 20px; color: #888; text-transform: uppercase; }
        #status { font-size: 18px; color: #2ecc71; margin-top: 20px; }
        button { padding: 15px 30px; font-size: 20px; border-radius: 50px; border: none; background: #2ecc71; color: white; cursor: pointer; }
        button.listening { background: #e74c3c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="player"><div class="label">P1</div><div id="p1-score">0</div></div>
        <div class="player"><div class="label">P2</div><div id="p2-score">0</div></div>
    </div>

    <button id="start-btn">Start Umpire</button>
    <div id="status">Waiting to start...</div>

    <script>
        let p1Score = 0;
        let p2Score = 0;
        let wakeLock = null;

        const startBtn = document.getElementById('start-btn');
        const statusDiv = document.getElementById('status');
        const p1Display = document.getElementById('p1-score');
        const p2Display = document.getElementById('p2-score');

        // 1. SPEECH RECOGNITION SETUP
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            console.log("Heard:", transcript);

            if (transcript.includes("point one") || transcript.includes("fifteen love")) {
                p1Score++;
                announce("Point Player One");
            } else if (transcript.includes("point two") || transcript.includes("love fifteen")) {
                p2Score++;
                announce("Point Player Two");
            } else if (transcript.includes("reset")) {
                p1Score = 0; p2Score = 0;
                announce("Resetting match");
            }
            updateUI();
        };

        // 2. STAY AWAKE LOGIC
        async function stayAwake() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { console.error(err); }
        }

        // 3. VOICE FEEDBACK
        function announce(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        function updateUI() {
            p1Display.innerText = p1Score;
            p2Display.innerText = p2Score;
        }

        startBtn.addEventListener('click', () => {
            recognition.start();
            stayAwake();
            startBtn.innerText = "Umpire Listening...";
            startBtn.classList.add('listening');
            statusDiv.innerText = "Say 'Point One' or 'Point Two'";
            announce("Umpire active. Standing by.");
        });

        // Restart mic if it drops (Common in browsers)
        recognition.onend = () => { if(startBtn.classList.contains('listening')) recognition.start(); };
    </script>
</body>
</html>
